<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../dist/index.css"></link>
  <script type="importmap">
    {
      "imports": {
        "screencap": "../dist/index.module.mjs"
      }
    }
  </script>
  <script type="module">
    import Screencap from 'screencap';

    document.querySelector('button').addEventListener('click', async (event) => {
      const screencap = new Screencap();
      const blob = await screencap.capture();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'screencap.png';
      a.click();
    });
  </script>
</head>
<body>
  <h1>Basic use</h1>
  <h2>Text</h2>
  <p>This is text.</p>
  <h2>Image</h2>
  <img src="./assets/sample_640x426.png">
  <h2>Video</h2>
  <video src="./assets/sample_640x360.webm" controls></video>
  <h2>Google Map</h2>
  <iframe src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d1620.4236926626966!2d139.768587!3d35.68075964999999!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1z5p2x5Lqs6aeF5YWr6YeN5rSy5Y-j!5e0!3m2!1sja!2sjp!4v1774321205580!5m2!1sja!2sjp" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
  <hr>
  <button type="button">Capture</button>
</body>
</html>
